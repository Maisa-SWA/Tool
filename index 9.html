function calc(p1,p2){
  if(!p1) return null;
  const r=Object.entries(W).reduce((a,[i,w])=>a+((p1[i]||1)/5)*w,0);
  const p1s=Math.round(r*0.5*10)/10;
  const p2s=Math.round(Object.entries(DP).reduce((a,[d,pts])=>a+((p2?.[d]||1)/5)*pts,0)*10)/10;
  const E=Math.round([1,2,3,4,5,6,7].reduce((a,i)=>a+((p1[i]||1)/5)*W[i],0)*0.5*10)/10;
  const S=Math.round([8,9,10,11,12,13].reduce((a,i)=>a+((p1[i]||1)/5)*W[i],0)*0.5*10)/10;
  const G=Math.round([14,15,16,17,18].reduce((a,i)=>a+((p1[i]||1)/5)*W[i],0)*0.5*10)/10;
  const total = Math.round((p1s+p2s)*10)/10;
  const score5 = Math.round((total*5/100)*100)/100;
  return{p1:p1s,p2:p2s,total,score5,E,S,G};
}

  const initOrgs = SEEDS.map(s=>({id:s.id,name:s.name,flag:s.flag,country:s.country}));
  const initScores = Object.fromEntries(SEEDS.map(s=>[s.id,{p1:s.p1,p2:s.p2}]));
  const initEv = Object.fromEntries(SEEDS.map(s=>[s.id,s.ev]));

  function loadSaved(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
  }

  const [orgs,setOrgs] = useState(()=>loadSaved('swa_orgs', initOrgs));
  const [scores,setScores] = useState(()=>loadSaved('swa_scores', initScores));
  const [ev,setEv2] = useState(()=>loadSaved('swa_ev', initEv));
  const [view,setView] = useState("home");
  const [aid,setAid] = useState(null);
  const [phase,setPhase] = useState(1);
  const [iid,setIid] = useState(1);
  const [newName,setNewName] = useState("");
  const [newFlag,setNewFlag] = useState("🌍");
  const [newCountry,setNewCountry] = useState("");
  const [showAdd,setShowAdd] = useState(false);
  const [showReset,setShowReset] = useState(false);

  useEffect(()=>{
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800&display=swap";
    document.head.appendChild(link);
  },[]);

  useEffect(()=>{ try { localStorage.setItem('swa_orgs', JSON.stringify(orgs)); } catch(e){} },[orgs]);
  useEffect(()=>{ try { localStorage.setItem('swa_scores', JSON.stringify(scores)); } catch(e){} },[scores]);
  useEffect(()=>{ try { localStorage.setItem('swa_ev', JSON.stringify(ev)); } catch(e){} },[ev]);

  const aOrg = orgs.find(o=>o.id===aid);
  const aSc = scores[aid]||{};
  const aEv = ev[aid]||{};

  function setScore(type,id,val){
    setScores(p=>({...p,[aid]:{...p[aid],[type]:{...p[aid]?.[type],[id]:val}}}));
  }
  function setEvVal(key,val){
    setEv2(p=>({...p,[aid]:{...p[aid],[key]:val}}));
  }
  function addOrg(){
    if(!newName.trim()||orgs.length>=25) return;
    const id="org_"+Date.now();
    setOrgs(p=>[...p,{id,name:newName.trim(),flag:newFlag,country:newCountry.trim()}]);
    setNewName(""); setNewFlag("🌍"); setNewCountry(""); setShowAdd(false);
  }
  function removeOrg(id){
    if(SEEDS.some(s=>s.id===id)) return;
    setOrgs(p=>p.filter(o=>o.id!==id));
    setScores(p=>{const n={...p};delete n[id];return n;});
    setEv2(p=>{const n={...p};delete n[id];return n;});
  }
  function doReset(){
    try { localStorage.removeItem('swa_orgs'); localStorage.removeItem('swa_scores'); localStorage.removeItem('swa_ev'); } catch(e){}
    setOrgs(initOrgs); setScores(initScores); setEv2(initEv);
    setShowReset(false); setView("home");
  }
  function completion(id){
    const sc=scores[id]||{};
    return Math.round(((Object.keys(sc.p1||{}).length+Object.keys(sc.p2||{}).length)/21)*100);
  }

  const evaluated = orgs.filter(o=>scores[o.id]?.p1);
  const sorted = [...evaluated].sort((a,b)=>(calc(scores[b.id].p1,scores[b.id].p2)?.total||0)-(calc(scores[a.id].p1,scores[a.id].p2)?.total||0));
  const avg = k=>sorted.length ? Math.round(sorted.reduce((a,o)=>a+(calc(scores[o.id].p1,scores[o.id].p2)?.[k]||0),0)/sorted.length*10)/10 : 0;

  const font = {fontFamily:"Tajawal, sans-serif"};
  const S = {minHeight:"100vh",background:"#F0F4F9",...font,direction:"rtl"};

  // ── COMPARE VIEW ──────────────────────────────────────────────────────────
  if(view==="compare") return (
    <div style={S}>
      <div style={{background:"linear-gradient(135deg,#0D2B52,#1A5F9E)",padding:"13px 22px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setView("home")} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",color:"#fff",borderRadius:8,padding:"6px 14px",fontSize:12,...font,cursor:"pointer"}}>
          الرئيسية
        </button>
        <div style={{flex:1,color:"#fff",fontWeight:800,fontSize:15}}>لوحة المقارنة — {sorted.length} جهة</div>
      </div>
      <div style={{maxWidth:980,margin:"0 auto",padding:"14px 22px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:14}}>
          {[["متوسط الإجمالي",avg("total"),"#0D2B52",100],["P1 ESG",avg("p1"),"#1A5F9E",50],["P2 جودة",avg("p2"),"#5A3090",50],["E بيئة",avg("E"),"#1E8B4C",18.4],["S مجتمع",avg("S"),"#C86010",15.95]].map(([l,v,c,mx])=>(
            <div key={l} style={{background:"#fff",borderRadius:10,padding:10,borderTop:"3px solid "+c}}>
              <div style={{fontWeight:900,fontSize:20,color:c}}>{v}</div>
              <div style={{fontSize:9,color:"#888",marginBottom:3}}>{l}</div>
              <Bar v={v} max={mx} color={c} h={3} />
            </div>
          ))}
        </div>
        <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12}}>
          <div style={{fontWeight:700,color:"#0D2B52",fontSize:14,marginBottom:10}}>الترتيب العالمي</div>
          {sorted.map((org,idx)=>{
            const sc=calc(scores[org.id].p1,scores[org.id].p2);
            const lv=getLevel(sc.total);
            const medal=idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":(idx+1)+".";
            const isNew=["kahramaa_s","marafiq_s","calwater_s"].includes(org.id);
            return(
              <div key={org.id} onClick={()=>{setAid(org.id);setPhase(1);setIid(1);setView("eval");}}
                style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",background:idx%2===0?"#F8FBFD":"#fff",borderRadius:8,marginBottom:4,cursor:"pointer",border:"1px solid #E8EDF2"}}>
                <div style={{fontSize:17,minWidth:26}}>{medal}</div>
                <div style={{fontSize:19}}>{org.flag}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#0D2B52",marginBottom:2}}>{org.name}</div>
                  <Bar v={sc.total} color={lv.color} h={4} />
                </div>
                {[["E",sc.E,"#1E8B4C"],["S",sc.S,"#C86010"],["G",sc.G,"#5A3090"],["P1",sc.p1,"#1A5F9E"],["P2",sc.p2,"#856404"]].map(([k,v,c])=>(
                  <div key={k} style={{textAlign:"center",minWidth:28}}>
                    <div style={{fontWeight:700,fontSize:11,color:c}}>{v}</div>
                    <div style={{fontSize:7,color:"#AAB"}}>{k}</div>
                  </div>
                ))}
                <div style={{textAlign:"center",minWidth:50}}>
                  <div style={{fontWeight:900,fontSize:24,color:lv.color,lineHeight:1}}>{sc.total}</div>
                  <div style={{fontSize:7,color:"#888"}}>/100</div>
                  <div style={{fontSize:9,color:lv.color,fontWeight:600,background:lv.bg,borderRadius:4,padding:"1px 4px"}}>{lv.short}</div>
                </div>
              </div>
            );
          })}
        </div>
        <CompareChart sorted={sorted} scores={scores} />
        <div style={{background:"#fff",borderRadius:14,padding:14,overflowX:"auto"}}>
          <div style={{fontWeight:700,color:"#0D2B52",fontSize:13,marginBottom:8}}>مقارنة تفصيلية</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,minWidth:560}}>
            <thead><tr style={{background:"#0D2B52"}}>
              {["الجهة","من 100","من 5","P1","P2","E","S","G"].map(h=><th key={h} style={{padding:"8px",color:"#fff",textAlign:"center",...font}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {sorted.map((org,ri)=>{
                const sc=calc(scores[org.id].p1,scores[org.id].p2);
                return(
                  <tr key={org.id} style={{background:ri%2===0?"#F8FBFD":"#fff"}}>
                    <td style={{padding:"7px 8px",fontWeight:600,...font}}>{org.flag} {org.name}</td>
                    {[sc.total,sc.score5,sc.p1,sc.p2,sc.E,sc.S,sc.G].map((v,ci)=>{
                      const mx=[100,5,50,50,18.4,15.95,15.63][ci];
                      const pct=(v/mx)*100;
                      const bg=pct>=80?"#D4EDDA":pct>=65?"#CCE5FF":pct>=50?"#FFF3CD":"#FFE0B2";
                      const tc2=pct>=80?"#155724":pct>=65?"#004085":pct>=50?"#856404":"#E65100";
                      return <td key={ci} style={{padding:"7px 8px",textAlign:"center",fontWeight:700,background:bg,color:tc2,...font}}>{v}</td>;
                    })}
                  </tr>
                );
              })}
              <tr style={{background:"#E8F2FA"}}>
                <td style={{padding:"7px 8px",fontWeight:700,color:"#0D2B52",...font}}>المتوسط</td>
                {["total","score5","p1","p2","E","S","G"].map(k=><td key={k} style={{padding:"7px 8px",textAlign:"center",fontWeight:700,color:"#0D2B52",...font}}>{avg(k)}</td>)}
              </tr>
            </tbody>
          </table>
        </div>
        <button onClick={()=>setView("home")} style={{width:"100%",background:"#0D2B52",color:"#fff",border:"none",borderRadius:10,padding:11,marginTop:10,fontSize:12,...font,cursor:"pointer"}}>
          الرئيسية
        </button>
      </div>
    </div>
  );

  // ── EVAL VIEW ─────────────────────────────────────────────────────────────
  if(view==="eval" && aOrg){
    const sc = aSc?.p1 ? calc(aSc.p1,aSc.p2) : null;
    const isP1 = phase===1;
    const curInd = isP1 ? INDS.find(i=>i.id===iid) : DISCS.find(d=>d.id===iid);
    const done = Object.keys(aSc?.p1||{}).length + Object.keys(aSc?.p2||{}).length;
    const scaleNow = isP1 ? SCALE : SCALE_D[iid];
    return (
      <div style={{minHeight:"100vh",background:"#F0F4F9",...font,direction:"rtl"}}>
        <div style={{background:"linear-gradient(135deg,#0D2B52,#1A5F9E)",padding:"10px 18px",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setView("home")} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",color:"#fff",borderRadius:7,padding:"5px 12px",fontSize:11,...font,cursor:"pointer"}}>
            الرئيسية
          </button>
          <div style={{flex:1}}>
            <div style={{color:"rgba(255,255,255,0.55)",fontSize:9}}>{done}/21 مؤشر</div>
            <div style={{color:"#fff",fontWeight:800,fontSize:14}}>{aOrg.flag} {aOrg.name}</div>
          </div>
          <div style={{width:70,height:4,background:"rgba(255,255,255,0.2)",borderRadius:99,overflow:"hidden"}}>
            <div style={{width:((done/21)*100)+"%",height:"100%",background:"#00E5A0"}} />
          </div>
          {sc && <div style={{background:"rgba(255,255,255,0.15)",borderRadius:7,padding:"3px 10px",color:"#fff",fontWeight:700,fontSize:14}}>{sc.total}</div>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"196px 1fr",minHeight:"calc(100vh - 48px)"}}>
          {/* Sidebar */}
          <div style={{background:"#1A2744",overflowY:"auto",padding:"6px 0"}}>
            {Object.entries(DM).map(([dim,meta])=>(
              <div key={dim}>
                <div style={{fontSize:8,color:meta.color,padding:"4px 8px",fontWeight:700}}>{meta.label}</div>
                {INDS.filter(i=>i.dim===dim).map(ind=>{
                  const s=aSc?.p1?.[ind.id];
                  const colors=["","#FFCCBC","#FFE0B2","#FFFDE7","#E3F2FD","#D4EDDA"];
                  const isAct=phase===1&&iid===ind.id;
                  return(
                    <button key={ind.id} onClick={()=>{setPhase(1);setIid(ind.id);}}
                      style={{width:"100%",background:isAct?"rgba(255,255,255,0.15)":"transparent",border:"none",display:"flex",alignItems:"center",gap:6,padding:"5px 8px",cursor:"pointer"}}>
                      <div style={{width:14,height:14,borderRadius:3,background:s?colors[s]:"rgba(255,255,255,0.1)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:s?"#333":"transparent"}}>{s}</div>
                      <span style={{fontSize:8,color:isAct?"#fff":"rgba(255,255,255,0.5)",textAlign:"right",lineHeight:1.3}}>{ind.id}. {ind.name}</span>
                    </button>
                  );
                })}
              </div>
            ))}
            <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",margin:"6px 0 2px",padding:"4px 0"}}>
              <div style={{fontSize:8,color:"rgba(255,255,255,0.4)",marginBottom:2,padding:"0 8px"}}>جودة الإفصاح P2</div>
              {DISCS.map(d=>{
                const s=aSc?.p2?.[d.id];
                const isAct=phase===2&&iid===d.id;
                return(
                  <button key={d.id} onClick={()=>{setPhase(2);setIid(d.id);}}
                    style={{width:"100%",background:isAct?"rgba(255,255,255,0.15)":"transparent",border:"none",display:"flex",alignItems:"center",gap:6,padding:"5px 8px",cursor:"pointer"}}>
                    <div style={{width:14,height:14,borderRadius:3,background:s?LBG[s]:"rgba(255,255,255,0.1)",flexShrink:0}} />
                    <span style={{fontSize:9,color:isAct?"#fff":"rgba(255,255,255,0.5)"}}>{d.icon} {d.label}</span>
                  </button>
                );
              })}
            </div>
            <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",margin:"4px 6px",padding:"4px 0"}}>
              <button onClick={()=>setPhase(3)}
                style={{width:"100%",background:phase===3?"linear-gradient(135deg,#1E6B3C,#2E8B57)":"transparent",border:"none",borderRadius:7,padding:"8px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <span style={{fontSize:13}}>💡</span>
                <span style={{fontSize:10,color:"#fff",fontWeight:phase===3?"700":"400"}}>نقاط القوة والفجوات</span>
              </button>
            </div>
          </div>
          {/* Main Panel */}
          <div style={{overflowY:"auto",padding:"13px 17px"}}>
            {phase===3 && <InsightPanel orgId={aOrg.id} />}
            {phase===3 && sc && <RadarChart scores={scores[aOrg.id]} p1={aSc.p1} />}
            {phase!==3 && curInd && (
              <>
                <div style={{background:"#fff",borderRadius:12,padding:13,marginBottom:9}}>
                  {isP1 && (
                    <div style={{display:"inline-block",background:DM[curInd.dim]?.bg,color:DM[curInd.dim]?.color,fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:6,marginBottom:6}}>
                      {DM[curInd.dim]?.label}
                    </div>
                  )}
                  <div style={{fontWeight:800,fontSize:15,color:"#0D2B52",marginBottom:3}}>
                    {isP1 ? (curInd.id+". "+curInd.name) : (curInd.icon+" "+curInd.label)}
                  </div>
                  <div style={{fontSize:10,color:"#888"}}>
                    {isP1 ? (curInd.gri+" | وزن: "+curInd.w+"%") : curInd.desc}
                  </div>
                </div>
                <div style={{background:"#fff",borderRadius:12,padding:13,marginBottom:9}}>
                  <div style={{fontWeight:700,color:"#0D2B52",fontSize:12,marginBottom:7}}>الدرجة</div>
                  {Object.entries(scaleNow).map(([grade,desc])=>{
                    const g=parseInt(grade);
                    const cur=isP1?(aSc?.p1?.[curInd.id]):(aSc?.p2?.[curInd.id]);
                    const sel=cur===g;
                    const bgColors=["","#FFCCBC","#FFE0B2","#FFFDE7","#E3F2FD","#D4EDDA"];
                    const bdColors=["","#BF360C","#E65100","#856404","#004085","#155724"];
                    const txtColors=["","#BF360C","#E65100","#856404","#004085","#155724"];
                    return(
                      <button key={grade} onClick={()=>isP1?setScore("p1",curInd.id,g):setScore("p2",curInd.id,g)}
                        style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:8,border:sel?"2px solid "+bdColors[g]:"2px solid transparent",background:sel?bgColors[g]:"#F8FBFD",marginBottom:5,cursor:"pointer",...font}}>
                        <div style={{width:26,height:26,borderRadius:6,background:sel?bdColors[g]:"#E8EDF2",color:sel?"#fff":"#888",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{g}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:10,fontWeight:700,color:sel?txtColors[g]:"#555",textAlign:"right"}}>{LLB[g]}</div>
                          <div style={{fontSize:9,color:"#777",textAlign:"right"}}>{desc}</div>
                        </div>
                        {sel && <div style={{fontSize:14,color:txtColors[g]}}>✓</div>}
                      </button>
                    );
                  })}
                </div>
                <div style={{background:"#fff",borderRadius:12,padding:13,marginBottom:9}}>
                  <div style={{fontWeight:700,color:"#0D2B52",fontSize:12,marginBottom:5}}>الأدلة</div>
                  <textarea
                    value={aEv[(isP1?"p1":"p2")+"_"+curInd.id]||""}
                    onChange={e=>setEvVal((isP1?"p1":"p2")+"_"+curInd.id,e.target.value)}
                    placeholder="الاقتباسات، الأرقام، الصفحة..."
                    style={{width:"100%",minHeight:68,padding:9,border:"1px solid #D0DCE8",borderRadius:8,fontSize:11,direction:"rtl",...font,resize:"vertical",boxSizing:"border-box"}}
                  />
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{
                    if(isP1){const idx=INDS.findIndex(i=>i.id===iid);idx>0?setIid(INDS[idx-1].id):null;}
                    else{const idx=DISCS.findIndex(d=>d.id===iid);idx>0?setIid(DISCS[idx-1].id):(setPhase(1),setIid(INDS[INDS.length-1].id));}
                  }} style={{flex:1,background:"#F0F4F9",color:"#444",border:"1px solid #D0DCE8",borderRadius:9,padding:9,fontSize:12,...font,cursor:"pointer"}}>
                    السابق
                  </button>
                  <button onClick={()=>{
                    if(isP1){const idx=INDS.findIndex(i=>i.id===iid);idx<INDS.length-1?setIid(INDS[idx+1].id):(setPhase(2),setIid(DISCS[0].id));}
                    else{const idx=DISCS.findIndex(d=>d.id===iid);idx<DISCS.length-1?setIid(DISCS[idx+1].id):setPhase(3);}
                  }} style={{flex:2,background:"linear-gradient(135deg,#1A5F9E,#0095C5)",color:"#fff",border:"none",borderRadius:9,padding:9,fontSize:12,fontWeight:700,...font,cursor:"pointer"}}>
                    التالي
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── HOME VIEW ─────────────────────────────────────────────────────────────
  return (
    <div style={S}>
      {showReset && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:16,padding:"28px 32px",maxWidth:360,textAlign:"center",...font}}>
            <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
            <div style={{fontWeight:800,fontSize:17,color:"#0D2B52",marginBottom:8}}>إعادة تعيين البيانات</div>
            <div style={{fontSize:13,color:"#666",marginBottom:20}}>سيتم العودة لـ {SEEDS.length} جهة أصلية</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowReset(false)} style={{flex:1,padding:10,borderRadius:9,border:"1px solid #D0DCE8",background:"#F0F4F9",...font,cursor:"pointer"}}>إلغاء</button>
              <button onClick={doReset} style={{flex:1,padding:10,borderRadius:9,border:"none",background:"#DC3545",color:"#fff",...font,cursor:"pointer"}}>تأكيد</button>
            </div>
          </div>
        </div>
      )}
      <div style={{background:"linear-gradient(135deg,#0D2B52,#1A5F9E,#0095C5)",padding:"22px 26px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:44,height:44,background:"rgba(255,255,255,0.15)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>💧</div>
            <div>
              <div style={{color:"rgba(255,255,255,0.55)",fontSize:9,letterSpacing:3}}>SAUDI WATER AUTHORITY</div>
              <div style={{color:"#fff",fontWeight:800,fontSize:17}}>تقييم تقارير الاستدامة</div>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:10}}>منهجية SWA v9 — 18 مؤشراً</div>
            </div>
          </div>
          <button onClick={()=>setShowReset(true)}
            style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.25)",color:"#fff",borderRadius:8,padding:"7px 14px",fontSize:11,...font,cursor:"pointer"}}>
            إعادة تعيين
          </button>
        </div>
      </div>
      <div style={{maxWidth:980,margin:"0 auto",padding:"16px 24px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
          {[
            {n:orgs.length,l:"جهة مُضافة",sub:"من أصل 25",c:"#1A5F9E"},
            {n:evaluated.length,l:"جهة مُقيَّمة",sub:"مكتملة أو جزئية",c:"#1E8B4C"},
            {n:25-orgs.length,l:"متبقية",sub:"يمكن إضافتها",c:"#C86010"},
            {n:sorted[0]?calc(scores[sorted[0].id].p1,scores[sorted[0].id].p2).total:"-",l:"أعلى درجة",sub:sorted[0]?.name||"—",c:"#5A3090"},
          ].map((s,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:10,padding:12,borderRight:"3px solid "+s.c}}>
              <div style={{fontWeight:900,fontSize:24,color:s.c}}>{s.n}</div>
              <div style={{fontSize:11,fontWeight:600,color:"#333"}}>{s.l}</div>
              <div style={{fontSize:9,color:"#AAA"}}>{s.sub}</div>
            </div>
          ))}
        </div>
        {orgs.length<25 && (showAdd ? (
          <div style={{background:"#fff",borderRadius:13,padding:14,marginBottom:12,border:"2px solid #1A5F9E"}}>
            <div style={{fontWeight:700,color:"#0D2B52",fontSize:13,marginBottom:8}}>إضافة جهة جديدة</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="اسم الجهة"
                style={{flex:2,minWidth:150,padding:"8px 12px",border:"1px solid #D0DCE8",borderRadius:8,fontSize:12,...font,direction:"rtl"}} />
              <input value={newCountry} onChange={e=>setNewCountry(e.target.value)} placeholder="الدولة"
                style={{flex:1,minWidth:90,padding:"8px 12px",border:"1px solid #D0DCE8",borderRadius:8,fontSize:12,...font,direction:"rtl"}} />
              <input value={newFlag} onChange={e=>setNewFlag(e.target.value)} placeholder="🌍"
                style={{width:48,padding:8,border:"1px solid #D0DCE8",borderRadius:8,fontSize:18,textAlign:"center"}} />
              <button onClick={addOrg} style={{background:"#1A5F9E",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,...font,cursor:"pointer"}}>إضافة</button>
              <button onClick={()=>setShowAdd(false)} style={{background:"#F0F4F9",color:"#555",border:"1px solid #D0DCE8",borderRadius:8,padding:"8px 12px",fontSize:12,...font,cursor:"pointer"}}>إلغاء</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>setShowAdd(true)}
            style={{width:"100%",background:"#fff",border:"2px dashed #B0C8E0",borderRadius:10,padding:12,color:"#1A5F9E",fontSize:12,fontWeight:600,...font,cursor:"pointer",marginBottom:12}}>
            إضافة جهة جديدة ({25-orgs.length} متبقية)
          </button>
        ))}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:10,marginBottom:14}}>
          {orgs.map(org=>{
            const sc=scores[org.id]?.p1?calc(scores[org.id].p1,scores[org.id].p2):null;
            const lv=sc?getLevel(sc.total):null;
            const pct=completion(org.id);
            const isSeed=SEEDS.some(s=>s.id===org.id);
            const hasInsight=!!INSIGHTS[org.id];
            return(
              <div key={org.id}
                style={{background:sc?lv.bg:"#fff",border:"2px solid "+(sc?lv.color+"44":"#E8EDF2"),borderRadius:14,padding:"14px 12px",position:"relative",transition:"transform 0.15s",cursor:"default"}}>
                {!isSeed && (
                  <button onClick={()=>removeOrg(org.id)}
                    style={{position:"absolute",top:7,left:7,background:"none",border:"none",color:"#ccc",fontSize:14,cursor:"pointer",padding:0}}>
                    ✕
                  </button>
                )}
                <div style={{fontSize:28,marginBottom:4}}>{org.flag}</div>
                <div style={{fontWeight:700,fontSize:13,color:"#0D2B52",marginBottom:1}}>{org.name}</div>
                {org.country && <div style={{fontSize:9,color:"#999",marginBottom:6}}>{org.country}</div>}
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:7}}>
                  <div style={{flex:1,height:3,background:"#E8EDF2",borderRadius:99,overflow:"hidden"}}>
                    <div style={{width:pct+"%",height:"100%",background:pct===100?"#1E8B4C":"#1A5F9E"}} />
                  </div>
                  <span style={{fontSize:9,color:"#999",minWidth:24}}>{pct}%</span>
                </div>
                {sc ? (
                  <>
                    <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                      <div style={{fontWeight:900,fontSize:30,color:lv.color,lineHeight:1}}>{sc.total}</div>
                      <div style={{fontSize:11,color:lv.color,fontWeight:700}}>/ {sc.score5}<span style={{fontSize:9,color:"#aaa"}}> من 5</span></div>
                    </div>
                    <div style={{fontSize:10,color:lv.color,fontWeight:600,marginBottom:5}}>{lv.label}</div>
                    <div style={{display:"flex",gap:10,marginBottom:6}}>
                      {[["E",sc.E,"#1E8B4C"],["S",sc.S,"#C86010"],["G",sc.G,"#5A3090"]].map(([k,v,c])=>(
                        <div key={k} style={{textAlign:"center"}}>
                          <div style={{fontWeight:700,fontSize:12,color:c}}>{v}</div>
                          <div style={{fontSize:8,color:"#BBB"}}>{k}</div>
                        </div>
                      ))}
                    </div>
                    {hasInsight && (
                      <button onClick={()=>{setAid(org.id);setPhase(3);setView("eval");}}
                        style={{width:"100%",background:"linear-gradient(135deg,#1E6B3C,#2E8B57)",color:"#fff",border:"none",borderRadius:7,padding:"6px 0",fontSize:11,fontWeight:700,...font,cursor:"pointer",marginBottom:5}}>
                        💡 نقاط القوة والفجوات
                      </button>
                    )}
                  </>
                ) : (
                  <div style={{fontSize:10,color:"#BBB",marginBottom:8}}>لم يُقيَّم بعد</div>
                )}
                <button onClick={()=>{setAid(org.id);setPhase(1);setIid(1);setView("eval");}}
                  style={{width:"100%",background:sc?"rgba(0,0,0,0.07)":"linear-gradient(135deg,#1A5F9E,#0095C5)",color:sc?"#0D2B52":"#fff",border:"none",borderRadius:7,padding:"7px 0",fontSize:11,fontWeight:600,...font,cursor:"pointer"}}>
                  {sc?(pct===100?"مراجعة التقييم":"استكمال التقييم"):"بدء التقييم"}
                </button>
              </div>
            );
          })}
        </div>
        {sorted.length>=2 && (
          <button onClick={()=>setView("compare")}
            style={{width:"100%",background:"linear-gradient(135deg,#0D2B52,#1A5F9E)",color:"#fff",border:"none",borderRadius:12,padding:13,fontSize:13,fontWeight:700,...font,cursor:"pointer",marginBottom:12}}>
            لوحة المقارنة الشاملة ({evaluated.length} جهات)
          </button>
        )}
        <div style={{marginTop:12,padding:"10px 0",borderTop:"1px solid #E0EAF4",display:"flex",justifyContent:"space-between"}}>
          <div style={{fontSize:9,color:"#BBB"}}>GRI 1:2021 — AA1000AP — ISSA 5000</div>
          <div style={{fontSize:9,color:"#BBB"}}>SWA v9 — الهيئة السعودية للمياه — {SEEDS.length} جهة</div>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
